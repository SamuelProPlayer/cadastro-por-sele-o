            <h1>Lets explore  <br> how Notion can work for you.</h1>

        <div class="login"> 
            <div class="card-login"> 
                <h1>Cadastro</h1>

                <div class="textfield">
                    <label for="usuario">Nome Completo</label>
                    <input type="text" name="nome" placeholder="Usuario">
                </div>

                <div class="textfield">
                    <label for="email">Email</label>
                    <input type="text" name="email" placeholder="Email">
                </div>

                <div class="textfield">
                    <label for="senha">Nome da Empresa</label>
                    <input type="text" name="nome_da_empresa" placeholder="Nome da empresa">
                </div>
                <div class="select">
                    <label for="Tamanho da Empresa">Tamanho da Empresa</label>
                    <select id="tamanho_empresa" name="tamanho_empresa" placeholder="Tamanho da empresa">
                         <option value="Pequena">Pequena</option>
                         <option value="Media">Média</option>
                         <option value="Grande">Grande</option>
                         <option value="Multinacional">Multinacional</option>
                </div>
                 <div class="select">
                    <label for="País ou região">País ou região</label>
                    <select id="localização" name="localização" placeholder="localização">
                         <option value="brasil">Brasil</option>
                         <option value="america lat">América Latina</option>
                         <option value="paraguai">Paraguai</option>
                         <option value="balcãs">Balcãs</option>
                         </select>
                        </div>
                        <div class="select">
    <label for="localizacao">País ou região</label>
    
    <select id="localizacao" name="loc">
        <option value="" disabled selected>Selecione a localização</option>
        <option value="brasil">Brasil</option>
        <option value="america_lat">América Latina</option>
        <option value="paraguai">Paraguai</option>
        <option value="balcas">Balcãs</option>
    </select>
</div>
                        <div class="textfield">
                    <label for="senha">Alguma coisa a mais</label>
                    <input type="text" name="Algo a mais" placeholder="Algo a mais">
                </div>
                <div class="label1"> 
                <input type="checkbox">
                <label class="label1">Enviando esse formulário você aceita os termos de privacidade. </label> </div> 

                <button class="btn-cadastro">Cadastrar</button>
            </div> 
        </div> 


    </div>
